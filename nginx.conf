server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://api.green-api.com/;
        proxy_set_header Host api.green-api.com;
        proxy_set_header X-Real-IP $remote_addr;
    }
}